services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiworld}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiworld_dev}
      POSTGRES_DB: ${POSTGRES_DB:-aiworld}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-aiworld} -d ${POSTGRES_DB:-aiworld}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ${REGISTRY:?Missing REGISTRY}/aiworld-api:${IMAGE_TAG:?Missing IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      default:
      edge:
        aliases:
          - production-api
      observability:
        aliases:
          - production-api

  worker:
    image: ${REGISTRY:?Missing REGISTRY}/aiworld-worker:${IMAGE_TAG:?Missing IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  web:
    image: ${REGISTRY:?Missing REGISTRY}/aiworld-web:${IMAGE_TAG:?Missing IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      edge:
        aliases:
          - production-web

volumes:
  pgdata:
    external: true
    name: ${PRODUCTION_PGDATA_VOLUME:-server_pgdata}
  redisdata:
    external: true
    name: ${PRODUCTION_REDISDATA_VOLUME:-server_redisdata}
  uploads:
    external: true
    name: ${PRODUCTION_UPLOADS_VOLUME:-server_uploads}

networks:
  edge:
    external: true
    name: aiworld-edge
  observability:
    external: true
    name: aiworld-observability
