global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: aiworld-production-api
    scheme: http
    metrics_path: /metrics
    static_configs:
      - targets: ['production-api:3000']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
