version: '3.9'

services:
  edge:
    image: nginx:1.27-alpine
    container_name: aiworld-edge
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ../../nginx-domain.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot
    networks:
      - edge

volumes:
  certbot-webroot:

networks:
  edge:
    external: true
    name: aiworld-edge
