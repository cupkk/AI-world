name: Promote Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag that already passed staging
        required: true
        type: string

permissions:
  contents: read
  packages: read

env:
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-staging:
    name: Verify staging before production promote
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run staging live smoke
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          LIVE_ADMIN_EMAIL_STAGING: ${{ secrets.LIVE_ADMIN_EMAIL_STAGING }}
          LIVE_ADMIN_PASSWORD_STAGING: ${{ secrets.LIVE_ADMIN_PASSWORD_STAGING }}
          LIVE_LEARNER_EMAIL_STAGING: ${{ secrets.LIVE_LEARNER_EMAIL_STAGING }}
          LIVE_LEARNER_PASSWORD_STAGING: ${{ secrets.LIVE_LEARNER_PASSWORD_STAGING }}
          LIVE_EXPERT_EMAIL_STAGING: ${{ secrets.LIVE_EXPERT_EMAIL_STAGING }}
          LIVE_EXPERT_PASSWORD_STAGING: ${{ secrets.LIVE_EXPERT_PASSWORD_STAGING }}
          LIVE_ENTERPRISE_EMAIL_STAGING: ${{ secrets.LIVE_ENTERPRISE_EMAIL_STAGING }}
          LIVE_ENTERPRISE_PASSWORD_STAGING: ${{ secrets.LIVE_ENTERPRISE_PASSWORD_STAGING }}
        run: npx playwright test -c playwright.live.config.ts tests/live/prod-smoke.spec.ts

      - name: Run staging live mutation
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          LIVE_ALLOW_MUTATIONS: "1"
          LIVE_ADMIN_EMAIL_STAGING: ${{ secrets.LIVE_ADMIN_EMAIL_STAGING }}
          LIVE_ADMIN_PASSWORD_STAGING: ${{ secrets.LIVE_ADMIN_PASSWORD_STAGING }}
          LIVE_LEARNER_EMAIL_STAGING: ${{ secrets.LIVE_LEARNER_EMAIL_STAGING }}
          LIVE_LEARNER_PASSWORD_STAGING: ${{ secrets.LIVE_LEARNER_PASSWORD_STAGING }}
          LIVE_EXPERT_EMAIL_STAGING: ${{ secrets.LIVE_EXPERT_EMAIL_STAGING }}
          LIVE_EXPERT_PASSWORD_STAGING: ${{ secrets.LIVE_EXPERT_PASSWORD_STAGING }}
          LIVE_ENTERPRISE_EMAIL_STAGING: ${{ secrets.LIVE_ENTERPRISE_EMAIL_STAGING }}
          LIVE_ENTERPRISE_PASSWORD_STAGING: ${{ secrets.LIVE_ENTERPRISE_PASSWORD_STAGING }}
        run: npx playwright test -c playwright.live.config.ts tests/live/staging-mutation.spec.ts

  promote:
    name: Promote approved image to production
    runs-on: ubuntu-latest
    needs: verify-staging
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Resolve container registry
        id: registry
        env:
          INPUT_DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
          INPUT_DOCKER_REGISTRY_HOST: ${{ secrets.DOCKER_REGISTRY_HOST }}
          INPUT_DOCKER_REGISTRY_USER: ${{ secrets.DOCKER_REGISTRY_USER }}
          INPUT_DOCKER_REGISTRY_PASS: ${{ secrets.DOCKER_REGISTRY_PASS }}
          FALLBACK_ACTOR: ${{ github.actor }}
          FALLBACK_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          owner="$(printf '%s' "${REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(printf '%s' "${REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]')"
          default_registry="ghcr.io/${owner}/${repo}"
          derived_host="${INPUT_DOCKER_REGISTRY%%/*}"
          using_custom_registry=0
          if [ -n "${INPUT_DOCKER_REGISTRY}" ] || [ -n "${INPUT_DOCKER_REGISTRY_HOST}" ]; then
            using_custom_registry=1
          fi

          if [ "${using_custom_registry}" -eq 1 ]; then
            registry="${INPUT_DOCKER_REGISTRY}"
            registry_host="${INPUT_DOCKER_REGISTRY_HOST:-${derived_host}}"
            registry_user="${INPUT_DOCKER_REGISTRY_USER}"
            registry_password="${INPUT_DOCKER_REGISTRY_PASS}"

            if [ -z "${registry}" ] || [ -z "${registry_host}" ] || [ -z "${registry_user}" ] || [ -z "${registry_password}" ]; then
              echo "::error::Custom registry mode requires DOCKER_REGISTRY, DOCKER_REGISTRY_HOST, DOCKER_REGISTRY_USER, and DOCKER_REGISTRY_PASS."
              exit 1
            fi
          else
            registry="${default_registry}"
            registry_host="ghcr.io"
            registry_user="${FALLBACK_ACTOR}"
            registry_password="${FALLBACK_TOKEN}"
          fi
          {
            echo "registry=${registry}"
            echo "registry_host=${registry_host}"
            echo "registry_user=${registry_user}"
            echo "registry_password=${registry_password}"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate production secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
          LIVE_ADMIN_EMAIL: ${{ secrets.LIVE_ADMIN_EMAIL }}
          LIVE_ADMIN_PASSWORD: ${{ secrets.LIVE_ADMIN_PASSWORD }}
          LIVE_LEARNER_EMAIL: ${{ secrets.LIVE_LEARNER_EMAIL }}
          LIVE_LEARNER_PASSWORD: ${{ secrets.LIVE_LEARNER_PASSWORD }}
          LIVE_EXPERT_EMAIL: ${{ secrets.LIVE_EXPERT_EMAIL }}
          LIVE_EXPERT_PASSWORD: ${{ secrets.LIVE_EXPERT_PASSWORD }}
          LIVE_ENTERPRISE_EMAIL: ${{ secrets.LIVE_ENTERPRISE_EMAIL }}
          LIVE_ENTERPRISE_PASSWORD: ${{ secrets.LIVE_ENTERPRISE_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for key in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY PRODUCTION_BASE_URL LIVE_ADMIN_EMAIL LIVE_ADMIN_PASSWORD LIVE_LEARNER_EMAIL LIVE_LEARNER_PASSWORD LIVE_EXPERT_EMAIL LIVE_EXPERT_PASSWORD LIVE_ENTERPRISE_EMAIL LIVE_ENTERPRISE_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: ${key}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Configure SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Verify SSH connectivity
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          ssh_host="$(printf '%s' "${SSH_HOST}" | tr -d '\r\n' | xargs)"
          ssh_user="$(printf '%s' "${SSH_USER}" | tr -d '\r\n' | xargs)"
          if [ -z "${ssh_host}" ] || [ -z "${ssh_user}" ]; then
            echo "::error::DEPLOY_HOST or DEPLOY_USER is empty after trimming whitespace."
            exit 1
          fi
          case "${ssh_host}" in
            *[!A-Za-z0-9._-]*)
              echo "::error::DEPLOY_HOST must be a raw hostname or IP without protocol, path, spaces, or quotes. Current trimmed value: ${ssh_host}"
              exit 1
              ;;
          esac
          case "${ssh_user}" in
            *[!A-Za-z0-9._-]*)
              echo "::error::DEPLOY_USER contains invalid characters after trimming. Current trimmed value: ${ssh_user}"
              exit 1
              ;;
          esac
          ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=15 "${ssh_user}@${ssh_host}" "hostname && docker --version"

      - name: Deploy production stack
        env:
          REGISTRY: ${{ steps.registry.outputs.registry }}
          REGISTRY_HOST: ${{ steps.registry.outputs.registry_host }}
          REGISTRY_USER: ${{ steps.registry.outputs.registry_user }}
          REGISTRY_PASSWORD: ${{ steps.registry.outputs.registry_password }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          ssh_host="$(printf '%s' "${SSH_HOST}" | tr -d '\r\n' | xargs)"
          ssh_user="$(printf '%s' "${SSH_USER}" | tr -d '\r\n' | xargs)"
          remote_env="REGISTRY=${REGISTRY@Q} REGISTRY_HOST=${REGISTRY_HOST@Q} REGISTRY_USER=${REGISTRY_USER@Q} REGISTRY_PASSWORD=${REGISTRY_PASSWORD@Q} IMAGE_TAG=${IMAGE_TAG@Q}"
          ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=no "${ssh_user}@${ssh_host}" "${remote_env} bash -s" <<'EOF'
            set -euo pipefail
            printf '%s' "${REGISTRY_PASSWORD}" | docker login "${REGISTRY_HOST}" -u "${REGISTRY_USER}" --password-stdin
            cd /opt/aiworld/server
            chmod +x ./scripts/*.sh
            ./scripts/ensure-docker-networks.sh
            docker compose -f ./ops/docker-compose.edge.yml up -d
            docker compose -f ./ops/docker-compose.observability.yml up -d
            REGISTRY="${REGISTRY}" IMAGE_TAG="${IMAGE_TAG}" ./scripts/deploy-stack.sh production
          EOF

      - name: Run production readiness checks
        env:
          PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
        run: bash server/scripts/check-stack.sh production "${PRODUCTION_BASE_URL}"

      - name: Verify production observability
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          ssh_host="$(printf '%s' "${SSH_HOST}" | tr -d '\r\n' | xargs)"
          ssh_user="$(printf '%s' "${SSH_USER}" | tr -d '\r\n' | xargs)"
          ssh -i ~/.ssh/id_rsa -o IdentitiesOnly=yes -o StrictHostKeyChecking=no "${ssh_user}@${ssh_host}" <<'EOF'
            set -euo pipefail
            cd /opt/aiworld/server
            sleep 5
            ./scripts/verify-observability.sh
          EOF

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run production smoke
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
          PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
          LIVE_ADMIN_EMAIL: ${{ secrets.LIVE_ADMIN_EMAIL }}
          LIVE_ADMIN_PASSWORD: ${{ secrets.LIVE_ADMIN_PASSWORD }}
          LIVE_LEARNER_EMAIL: ${{ secrets.LIVE_LEARNER_EMAIL }}
          LIVE_LEARNER_PASSWORD: ${{ secrets.LIVE_LEARNER_PASSWORD }}
          LIVE_EXPERT_EMAIL: ${{ secrets.LIVE_EXPERT_EMAIL }}
          LIVE_EXPERT_PASSWORD: ${{ secrets.LIVE_EXPERT_PASSWORD }}
          LIVE_ENTERPRISE_EMAIL: ${{ secrets.LIVE_ENTERPRISE_EMAIL }}
          LIVE_ENTERPRISE_PASSWORD: ${{ secrets.LIVE_ENTERPRISE_PASSWORD }}
        run: npx playwright test -c playwright.live.config.ts tests/live/prod-smoke.spec.ts
