name: Deploy Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build-push-deploy:
    name: Build, Push, and Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY_HOST }}
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PASS }}

      - name: Build and push backend image
        run: |
          IMAGE_TAG="${{ secrets.DOCKER_REGISTRY }}/aiworld-api:${{ github.event.workflow_run.head_sha || github.sha }}"
          docker build -t "${IMAGE_TAG}" --target production ./server
          docker push "${IMAGE_TAG}"

      - name: Build and push frontend image
        run: |
          IMAGE_TAG="${{ secrets.DOCKER_REGISTRY }}/aiworld-web:${{ github.event.workflow_run.head_sha || github.sha }}"
          docker build \
            --build-arg VITE_ENABLE_DEMO_MODE=false \
            --build-arg VITE_ALLOW_DEMO_PREFILL=false \
            -t "${IMAGE_TAG}" \
            -f Dockerfile .
          docker push "${IMAGE_TAG}"

      - name: Build and push worker image
        run: |
          IMAGE_TAG="${{ secrets.DOCKER_REGISTRY }}/aiworld-worker:${{ github.event.workflow_run.head_sha || github.sha }}"
          docker build -t "${IMAGE_TAG}" ./worker
          docker push "${IMAGE_TAG}"

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy staging stack
        env:
          REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" <<'EOF'
            set -euo pipefail
            cd /opt/aiworld/server
            chmod +x ./scripts/*.sh
            ./scripts/ensure-docker-networks.sh
            docker compose -f ./ops/docker-compose.edge.yml up -d
            docker compose -f ./ops/docker-compose.observability.yml up -d
            REGISTRY="${{ secrets.DOCKER_REGISTRY }}" IMAGE_TAG="${{ github.event.workflow_run.head_sha || github.sha }}" ./scripts/deploy-stack.sh staging
          EOF

      - name: Wait for staging health checks
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
        run: |
          bash server/scripts/check-stack.sh staging "${STAGING_BASE_URL}"

      - name: Verify staging observability
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no "${SSH_USER}@${SSH_HOST}" <<'EOF'
            set -euo pipefail
            cd /opt/aiworld/server
            sleep 5
            ./scripts/verify-observability.sh
          EOF

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run staging live smoke
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          LIVE_ADMIN_EMAIL_STAGING: ${{ secrets.LIVE_ADMIN_EMAIL_STAGING }}
          LIVE_ADMIN_PASSWORD_STAGING: ${{ secrets.LIVE_ADMIN_PASSWORD_STAGING }}
          LIVE_LEARNER_EMAIL_STAGING: ${{ secrets.LIVE_LEARNER_EMAIL_STAGING }}
          LIVE_LEARNER_PASSWORD_STAGING: ${{ secrets.LIVE_LEARNER_PASSWORD_STAGING }}
          LIVE_EXPERT_EMAIL_STAGING: ${{ secrets.LIVE_EXPERT_EMAIL_STAGING }}
          LIVE_EXPERT_PASSWORD_STAGING: ${{ secrets.LIVE_EXPERT_PASSWORD_STAGING }}
          LIVE_ENTERPRISE_EMAIL_STAGING: ${{ secrets.LIVE_ENTERPRISE_EMAIL_STAGING }}
          LIVE_ENTERPRISE_PASSWORD_STAGING: ${{ secrets.LIVE_ENTERPRISE_PASSWORD_STAGING }}
        run: npx playwright test -c playwright.live.config.ts tests/live/prod-smoke.spec.ts

      - name: Run staging live mutation
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          LIVE_ALLOW_MUTATIONS: '1'
          LIVE_ADMIN_EMAIL_STAGING: ${{ secrets.LIVE_ADMIN_EMAIL_STAGING }}
          LIVE_ADMIN_PASSWORD_STAGING: ${{ secrets.LIVE_ADMIN_PASSWORD_STAGING }}
          LIVE_LEARNER_EMAIL_STAGING: ${{ secrets.LIVE_LEARNER_EMAIL_STAGING }}
          LIVE_LEARNER_PASSWORD_STAGING: ${{ secrets.LIVE_LEARNER_PASSWORD_STAGING }}
          LIVE_EXPERT_EMAIL_STAGING: ${{ secrets.LIVE_EXPERT_EMAIL_STAGING }}
          LIVE_EXPERT_PASSWORD_STAGING: ${{ secrets.LIVE_EXPERT_PASSWORD_STAGING }}
          LIVE_ENTERPRISE_EMAIL_STAGING: ${{ secrets.LIVE_ENTERPRISE_EMAIL_STAGING }}
          LIVE_ENTERPRISE_PASSWORD_STAGING: ${{ secrets.LIVE_ENTERPRISE_PASSWORD_STAGING }}
        run: npx playwright test -c playwright.live.config.ts tests/live/staging-mutation.spec.ts
